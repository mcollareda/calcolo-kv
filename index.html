<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calcolatore Termodinamico Kv V2 - HUB Società di Ingegneria</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Roboto+Condensed:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      var(--bg): #f8fafc;
      --card: #ffffff;
      --text: #111827; 
      --muted: #6b7280;
      --border: #e5e7eb; 
      --hub-violet: #3C364C;
      --hub-violet-hover: #4e4663;
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      --radius: 12px;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Poppins', sans-serif; background: #f8fafc; color: var(--text); }
    h2 { font-weight: 600; letter-spacing: -0.5px; }

    #login-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100vh; background: var(--hub-violet);
      display: flex; justify-content: center; align-items: center; z-index: 9999;
    }
    .login-box { background: white; padding: 40px; border-radius: 12px; text-align: center; max-width: 400px; width: 90%; }
    .login-box h2 { color: var(--hub-violet); margin-bottom: 20px; text-transform: uppercase; }
    .login-box input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid var(--border); border-radius: 8px; text-align: center;}
    .login-box button { width: 100%; padding: 12px; background: var(--hub-violet); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;}

    .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
    .header { background: var(--hub-violet); color: white; border-radius: var(--radius); padding: 30px; margin-bottom: 30px; }
    .header h1 { margin: 0; font-family: 'Roboto Condensed', sans-serif; font-size: 2.2rem;}

    .card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow-sm); border: 1px solid var(--border); padding: 25px; margin-bottom: 25px; }
    .section-title { margin: 0 0 20px 0; font-size: 1.2rem; color: var(--hub-violet); border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; }

    .grid-3 { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 15px; }
    .field { display: flex; flex-direction: column; gap: 5px; }
    label { font-size: 0.8rem; font-weight: 600; color: var(--muted); text-transform: uppercase; }
    input, select { padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; font-size: 1rem; }
    input[disabled] { background-color: #f1f5f9; color: #94a3b8; }

    .result-box { background: var(--hub-violet); color: white; padding: 20px; border-radius: 10px; text-align: center; margin-top: 20px; font-size: 1.4rem; font-weight: 700; }
    .result-box span { font-size: 0.9rem; font-weight: 400; display: block; }
    
    /* Utility class per nascondere elementi */
    .hidden { display: none !important; }

    @media (max-width: 768px) { .grid-3 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <div id="login-overlay">
    <div class="login-box">
      <h2>Accesso HUB</h2>
      <input type="password" id="password-input" placeholder="Password (HUB2026)">
      <button onclick="checkPassword()">Accedi</button>
    </div>
  </div>

  <div class="container" id="main-content" style="display: none;">
    <div class="header">
      <h1>Calcolatore Kv & Perdite di Carico</h1>
      <p>Modello fluidodinamico con gestione miscele binarie.</p>
    </div>

    <div class="card">
      <h2 class="section-title">1. Specifiche del Fluido (Trifase/Miscele)</h2>
      <div class="grid-3">
        <div class="field">
          <label>Tipologia Fluido</label>
          <select id="fluidoSelect" onchange="gestisciFluido()">
            <option value="1.0">Acqua Pura</option>
            <option value="eg">Acqua + Glicole Etilenico</option>
            <option value="pg">Acqua + Glicole Propilenico</option>
            <option value="eth">Acqua + Etanolo</option>
            <option value="0.88">Olio Diatermico (Standard)</option>
            <option value="custom">Personalizzato...</option>
          </select>
        </div>
        
        <div class="field hidden" id="pctContainer">
          <label>Percentuale Miscela (%)</label>
          <input type="number" id="pctInput" min="0" max="100" value="30" step="1" oninput="gestisciFluido()">
        </div>

        <div class="field">
          <label>Gravità Specifica (SG)</label>
          <input type="number" id="sgInput" step="0.001" value="1.000" oninput="eseguiCalcolo()">
        </div>
      </div>
    </div>

    <div class="card">
      <h2 class="section-title">2. Risoluzione Equazioni</h2>
      <div class="field" style="margin-bottom: 20px;">
        <label>Seleziona l'incognita</label>
        <select id="calcMode" onchange="aggiornaInterfaccia()">
          <option value="kv">Calcola Kv (avendo Portata e Delta P)</option>
          <option value="q">Calcola Portata (avendo Kv e Delta P)</option>
          <option value="dp">Calcola Delta P (avendo Kv e Portata)</option>
        </select>
      </div>

      <div class="grid-3" id="inputContainer"></div>
      <div class="result-box" id="resultBox">In attesa di dati...</div>
    </div>
  </div>

  <script>
    function checkPassword() {
      if (document.getElementById('password-input').value === 'HUB2026') {
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('main-content').style.display = 'block';
        aggiornaInterfaccia();
      }
    }

    function gestisciFluido() {
      const type = document.getElementById('fluidoSelect').value;
      const pctContainer = document.getElementById('pctContainer');
      const sgInput = document.getElementById('sgInput');
      const pctInput = document.getElementById('pctInput');
      
      let pct = parseFloat(pctInput.value) || 0;

      // Se il fluido è una miscela, mostriamo il campo %
      if (['eg', 'pg', 'eth'].includes(type)) {
        pctContainer.classList.remove('hidden');
        sgInput.disabled = true; // Calcolato in automatico
        
        // Formule di interpolazione ingegneristica (Rif. a 20°C)
        if (type === 'eg') {
           sgInput.value = (1.0 + (0.00115 * pct)).toFixed(3);
        } else if (type === 'pg') {
           sgInput.value = (1.0 + (0.00036 * pct)).toFixed(3);
        } else if (type === 'eth') {
           sgInput.value = (1.0 - (0.00211 * pct)).toFixed(3);
        }
      } else {
        pctContainer.classList.add('hidden');
        if (type === 'custom') {
           sgInput.disabled = false;
        } else {
           sgInput.disabled = true;
           sgInput.value = parseFloat(type).toFixed(3);
        }
      }
      eseguiCalcolo();
    }

    function aggiornaInterfaccia() {
      const mode = document.getElementById('calcMode').value;
      const container = document.getElementById('inputContainer');
      
      let html = '';
      if (mode === 'kv') {
        html = `
          <div class="field"><label>Portata Q [m³/h]</label><input type="number" id="valQ" step="0.1" oninput="eseguiCalcolo()"></div>
          <div class="field"><label>Perdita di Carico Δp [bar]</label><input type="number" id="valDp" step="0.01" oninput="eseguiCalcolo()"></div>`;
      } else if (mode === 'q') {
        html = `
          <div class="field"><label>Coefficiente Kv</label><input type="number" id="valKv" step="0.1" oninput="eseguiCalcolo()"></div>
          <div class="field"><label>Perdita di Carico Δp [bar]</label><input type="number" id="valDp" step="0.01" oninput="eseguiCalcolo()"></div>`;
      } else if (mode === 'dp') {
        html = `
          <div class="field"><label>Coefficiente Kv</label><input type="number" id="valKv" step="0.1" oninput="eseguiCalcolo()"></div>
          <div class="field"><label>Portata Q [m³/h]</label><input type="number" id="valQ" step="0.1" oninput="eseguiCalcolo()"></div>`;
      }
      container.innerHTML = html;
      eseguiCalcolo();
    }

    function eseguiCalcolo() {
      const mode = document.getElementById('calcMode').value;
      const sg = parseFloat(document.getElementById('sgInput').value);
      const resultBox = document.getElementById('resultBox');

      if (isNaN(sg) || sg <= 0) { resultBox.innerHTML = 'SG non valido.'; return; }

      const kv = parseFloat(document.getElementById('valKv')?.value);
      const q = parseFloat(document.getElementById('valQ')?.value);
      const dp = parseFloat(document.getElementById('valDp')?.value);

      if (mode === 'kv' && q > 0 && dp > 0) {
        resultBox.innerHTML = `${(q * Math.sqrt(sg / dp)).toFixed(2)} <span>Coefficiente Kv</span>`;
      } else if (mode === 'q' && kv > 0 && dp > 0) {
        resultBox.innerHTML = `${(kv * Math.sqrt(dp / sg)).toFixed(2)} m³/h <span>Portata (Q)</span>`;
      } else if (mode === 'dp' && kv > 0 && q > 0) {
        resultBox.innerHTML = `${(sg * Math.pow((q / kv), 2)).toFixed(3)} bar <span>Perdita di Carico (Δp)</span>`;
      } else {
        resultBox.innerHTML = 'Compilare i campi per calcolare...';
      }
    }
  </script>
</body>
</html>
